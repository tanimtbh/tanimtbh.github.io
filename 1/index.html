<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>aiortc + NATS test</title>
  <style>
    body { font-family: system-ui; max-width: 900px; margin: 1rem auto; padding: 1rem; }
    video { width: 48%; background: #111; border-radius: 8px; }
    .row { display: flex; gap: 1rem; margin: 1rem 0; flex-wrap: wrap; }
    button { padding: 0.6rem 1rem; margin-right: 0.5rem; font-size: 1rem; }
    #log, #chat {
      background: #f4f4f4; padding: 0.5rem; height: 160px;
      overflow-y: auto; font-family: monospace; font-size: 12px;
      border-radius: 4px;
    }
    input { width: 70%; padding: 0.5rem; font-size: 1rem; }
    #state { font-weight: bold; margin-left: 0.5rem; }
    .err { color: #c00; font-weight: bold; }
    #conninfo {
      background: #f4f4f4; padding: 0.6rem 0.8rem;
      border-radius: 4px; font-family: monospace; font-size: 12px;
      min-height: 2.5rem;
    }
    #conninfo table { width: 100%; border-collapse: collapse; }
    #conninfo td { padding: 2px 10px 2px 0; vertical-align: top; }
    #conninfo td:first-child { color: #777; white-space: nowrap; width: 160px; }
    .relay-badge { color: #c60; font-weight: bold; }
    .direct-badge { color: #060; font-weight: bold; }
  </style>
</head>
<body>
  <h2>aiortc + NATS signaling test</h2>
  <button id="start">Start</button>
  <button id="stop" disabled>Stop</button>
  <span>state:</span><span id="state">idle</span>

  <div class="row">
    <video id="local" autoplay muted playsinline></video>
    <video id="remote" autoplay playsinline></video>
  </div>

  <h3>Connection Info</h3>
  <div id="conninfo"><em style="color:#999">not connected</em></div>

  <h3>Data channel</h3>
  <div id="chat"></div>
  <input id="msg" placeholder="type and press enter" disabled>

  <h3>Log</h3>
  <div id="log"></div>

<script type="module">
import { connect, StringCodec } from "https://cdn.jsdelivr.net/npm/nats.ws@1.29.2/esm/nats.js";

// ───── Config ─────────────────────────────────────────────────
const NATS_URL  = "wss://tunnel.knitnox.com";
const NATS_USER = "test";
const NATS_PASS = "abbatanim";
const SUBJECT   = "webrtc.signaling";

const TURN_USER = "tanim";
const TURN_PASS = "YOUR_TURN_PASSWORD";
const STUN_URL  = "stun:tunnel.knitnox.com:3478";
const TURN_URLS = [
  "turn:tunnel.knitnox.com:3478?transport=udp",
  "turn:tunnel.knitnox.com:3478?transport=tcp",
  "turns:tunnel.knitnox.com:5349?transport=tcp"
];
// ──────────────────────────────────────────────────────────────

const logEl  = document.getElementById("log");
const chatEl = document.getElementById("chat");
const log = (m, isErr=false) => {
  const line = document.createElement("div");
  if (isErr) line.className = "err";
  line.textContent = new Date().toLocaleTimeString() + " " + m;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
  console.log(m);
};
const chatLog = (m) => {
  chatEl.innerHTML += m + "<br>";
  chatEl.scrollTop = chatEl.scrollHeight;
};
const sc = StringCodec();

let pc, dc, localStream, nc;

// Global error visibility — catches anything that slips past try/catch
window.addEventListener("error", e => log("window error: " + e.message, true));
window.addEventListener("unhandledrejection", e =>
  log("unhandled: " + (e.reason?.message || e.reason), true));

// Check HTTPS / secure context early so you get a clear message on mobile
if (!window.isSecureContext) {
  log("WARNING: page is not in a secure context. getUserMedia will fail on mobile. Serve via https://", true);
}
if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
  log("WARNING: navigator.mediaDevices.getUserMedia unavailable in this browser/context", true);
}

let statsInterval = null;

function fmtBytes(b) {
  if (!b) return "0 B";
  if (b < 1024) return b + " B";
  if (b < 1048576) return (b / 1024).toFixed(1) + " KB";
  return (b / 1048576).toFixed(2) + " MB";
}

async function updateConnectionInfo() {
  if (!pc || pc.connectionState !== "connected") return;
  try {
    const stats = await pc.getStats();
    const byId = id => stats.get(id);

    for (const report of stats.values()) {
      if (report.type !== "candidate-pair" || !report.nominated) continue;
      const local  = byId(report.localCandidateId);
      const remote = byId(report.remoteCandidateId);
      if (!local || !remote) continue;

      const isRelay = local.candidateType === "relay" || remote.candidateType === "relay";
      const pathLabel = isRelay
        ? `<span class="relay-badge">TURN relay</span>`
        : `<span class="direct-badge">direct (${local.candidateType})</span>`;

      const localAddr  = `${local.address  || local.ip}:${local.port}`;
      const remoteAddr = `${remote.address || remote.ip}:${remote.port}`;

      const rows = [
        ["Path",            pathLabel],
        ["Local candidate", `${localAddr} &nbsp;<em>${local.candidateType}</em> &nbsp;${(local.protocol||"").toUpperCase()}`],
        ["Remote candidate",`${remoteAddr} &nbsp;<em>${remote.candidateType}</em> &nbsp;${(remote.protocol||"").toUpperCase()}`],
      ];

      if (local.candidateType === "relay" && local.relatedAddress)
        rows.push(["TURN server →local",  `${local.relatedAddress}:${local.relatedPort}`]);
      if (remote.candidateType === "relay" && remote.relatedAddress)
        rows.push(["TURN server →remote", `${remote.relatedAddress}:${remote.relatedPort}`]);
      if (local.candidateType === "srflx" && local.relatedAddress)
        rows.push(["LAN IP (local)",  `${local.relatedAddress}:${local.relatedPort}`]);
      if (remote.candidateType === "srflx" && remote.relatedAddress)
        rows.push(["LAN IP (remote)", `${remote.relatedAddress}:${remote.relatedPort}`]);

      if (report.currentRoundTripTime != null)
        rows.push(["RTT", `${(report.currentRoundTripTime * 1000).toFixed(1)} ms`]);
      if (report.availableOutgoingBitrate != null)
        rows.push(["Avail outgoing", `${(report.availableOutgoingBitrate / 1000).toFixed(0)} kbps`]);

      rows.push(["Bytes TX / RX",   `${fmtBytes(report.bytesSent)} / ${fmtBytes(report.bytesReceived)}`]);
      rows.push(["Packets TX / RX", `${report.packetsSent ?? "?"} / ${report.packetsReceived ?? "?"}`]);

      // media stats (inbound streams)
      const inbound = [...stats.values()].filter(r => r.type === "inbound-rtp");
      for (const r of inbound) {
        const codec = r.codecId ? byId(r.codecId) : null;
        const codecName = codec ? codec.mimeType : "?";
        rows.push([`${r.kind} codec`, codecName]);
        if (r.frameWidth)  rows.push([`${r.kind} resolution`, `${r.frameWidth}×${r.frameHeight} @ ${(r.framesPerSecond||0).toFixed(1)} fps`]);
        if (r.jitter != null) rows.push([`${r.kind} jitter`, `${(r.jitter * 1000).toFixed(1)} ms`]);
        if (r.packetsLost != null) rows.push([`${r.kind} packets lost`, r.packetsLost]);
      }

      document.getElementById("conninfo").innerHTML =
        `<table>${rows.map(([k,v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join("")}</table>`;
      return;
    }
  } catch (e) { /* ignore transient errors */ }
}

document.getElementById("start").onclick = async () => {
  document.getElementById("start").disabled = true;
  document.getElementById("stop").disabled  = false;

  try {
    // 1) Connect to NATS
    log("connecting to NATS " + NATS_URL + " ...");
    nc = await connect({ servers: NATS_URL, user: NATS_USER, pass: NATS_PASS });
    log("NATS connected");

    // 2) Create peer connection
    log("creating RTCPeerConnection...");
    pc = new RTCPeerConnection({
      iceServers: [
        { urls: STUN_URL },
        { urls: TURN_URLS, username: TURN_USER, credential: TURN_PASS }
      ]
    });

    pc.onconnectionstatechange = async () => {
      document.getElementById("state").innerText = pc.connectionState;
      log("pc state: " + pc.connectionState);
      if (pc.connectionState === "connected") {
        await updateConnectionInfo();
        statsInterval = setInterval(updateConnectionInfo, 2000);
      } else if (["disconnected","failed","closed"].includes(pc.connectionState)) {
        clearInterval(statsInterval); statsInterval = null;
        document.getElementById("conninfo").innerHTML = "<em style='color:#999'>not connected</em>";
      }
    };
    pc.oniceconnectionstatechange = () => log("ice state: " + pc.iceConnectionState);
    pc.onicegatheringstatechange  = () => log("gather state: " + pc.iceGatheringState);
    pc.onicecandidateerror = (e) =>
      log("ice candidate error code=" + e.errorCode + " " + (e.errorText || ""), true);

    pc.ontrack = (e) => {
      log("remote track: " + e.track.kind);
      document.getElementById("remote").srcObject = e.streams[0];
    };

    // 3) Data channel
    log("creating data channel...");
    dc = pc.createDataChannel("chat");
    dc.onopen    = () => { log("data channel OPEN"); document.getElementById("msg").disabled = false; };
    dc.onclose   = () => log("data channel closed");
    dc.onmessage = (e) => chatLog("← " + e.data);

    // 4) Get mic + camera
    log("requesting mic and camera...");
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
    log("got media, tracks: " + localStream.getTracks().map(t => t.kind).join(","));
    document.getElementById("local").srcObject = localStream;
    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

    // 5) Create offer
    log("creating offer...");
    const offer = await pc.createOffer();
    log("setting local description...");
    await pc.setLocalDescription(offer);

    // 6) Wait for ICE gathering with 3s fallback (mobile networks can hang)
    log("waiting for ICE gathering (max 3s)...");
    await new Promise(resolve => {
      if (pc.iceGatheringState === "complete") return resolve();
      const done = () => { pc.onicegatheringstatechange = null; resolve(); };
      pc.onicegatheringstatechange = () => pc.iceGatheringState === "complete" && done();
      setTimeout(done, 3000);
    });
    log("gathering done, iceGatheringState=" + pc.iceGatheringState);

    // 7) Send offer via NATS request/reply
    log("publishing offer to " + SUBJECT + " ...");
    const payload = JSON.stringify({
      sdp: pc.localDescription.sdp,
      type: pc.localDescription.type
    });
    const reply = await nc.request(SUBJECT, sc.encode(payload), { timeout: 15000 });
    log("got reply from agent");

    // 8) Apply answer
    const answer = JSON.parse(sc.decode(reply.data));
    if (answer.error) { log("agent error: " + answer.error, true); return; }
    await pc.setRemoteDescription(answer);
    log("answer applied, waiting for ICE to connect...");

  } catch (e) {
    log("FAILED: " + (e.message || e), true);
    console.error(e);
  }
};

document.getElementById("msg").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && dc && dc.readyState === "open") {
    chatLog("→ " + e.target.value);
    dc.send(e.target.value);
    e.target.value = "";
  }
});

document.getElementById("stop").onclick = async () => {
  clearInterval(statsInterval); statsInterval = null;
  try {
    if (pc) pc.close();
    if (localStream) localStream.getTracks().forEach(t => t.stop());
    if (nc) await nc.close();
  } catch (e) { log("stop error: " + e.message, true); }
  document.getElementById("start").disabled = false;
  document.getElementById("stop").disabled  = true;
  document.getElementById("msg").disabled   = true;
  document.getElementById("state").innerText = "idle";
  log("stopped");
};
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pi Vision</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', system-ui, monospace;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Toolbar ── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    #toolbar .brand { color: #58a6ff; font-weight: 600; font-size: 15px; margin-right: 4px; }
    #toolbar input {
      background: #0d1117;
      color: #e6edf3;
      border: 1px solid #30363d;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 13px;
    }
    #toolbar input:focus { outline: none; border-color: #58a6ff; }

    /* ── Buttons ── */
    button {
      background: #21262d;
      color: #e6edf3;
      border: 1px solid #30363d;
      padding: 4px 13px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
    }
    button:hover:not(:disabled) { background: #30363d; }
    button:disabled { opacity: 0.45; cursor: default; }
    button.primary { background: #238636; border-color: #2ea043; }
    button.primary:hover:not(:disabled) { background: #2ea043; }
    button.danger  { background: #6e1c1c; border-color: #da3633; }
    button.danger:hover:not(:disabled)  { background: #b62324; }
    button.active  { background: #1f6feb; border-color: #388bfd; }

    /* ── Main area ── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* ── Video pane ── */
    #video-wrap {
      flex: 1;
      position: relative;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
    }
    #placeholder {
      color: #484f58;
      font-size: 18px;
      pointer-events: none;
      user-select: none;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 290px;
      min-width: 240px;
      display: flex;
      flex-direction: column;
      background: #161b22;
      border-left: 1px solid #30363d;
      overflow: hidden;
    }

    /* panel base */
    .panel { padding: 11px 13px; border-bottom: 1px solid #30363d; flex-shrink: 0; }
    .panel h3 {
      font-size: 11px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.9px;
      margin-bottom: 9px;
    }

    /* ── Stats ── */
    .stat-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      font-family: monospace;
      padding: 2px 0;
    }
    .stat-key { color: #8b949e; }
    .stat-val { color: #58a6ff; }
    .stat-val.good  { color: #3fb950; }
    .stat-val.warn  { color: #d29922; }
    .stat-val.bad   { color: #f85149; }

    /* ── Controls ── */
    .ctrl-block { margin-bottom: 9px; }
    .ctrl-block:last-child { margin-bottom: 0; }
    .ctrl-label { font-size: 11px; color: #8b949e; margin-bottom: 4px; }
    .ctrl-row { display: flex; gap: 5px; }
    .ctrl-row button { flex: 1; padding: 4px 4px; font-size: 12px; }
    select {
      flex: 1;
      background: #0d1117;
      color: #e6edf3;
      border: 1px solid #30363d;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
    }
    select:focus { outline: none; border-color: #58a6ff; }

    /* ── Chat ── */
    #chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    #chat-panel h3 {
      font-size: 11px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.9px;
      padding: 11px 13px 8px;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
    }
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 8px 13px;
      font-size: 12px;
      font-family: monospace;
      scroll-behavior: smooth;
    }
    #chat-messages::-webkit-scrollbar { width: 5px; }
    #chat-messages::-webkit-scrollbar-track { background: transparent; }
    #chat-messages::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    .msg { padding: 1px 0; word-break: break-word; }
    .msg .pc  { color: #58a6ff; }
    .msg .pi  { color: #3fb950; }
    .msg .sys { color: #8b949e; font-style: italic; }
    #chat-input-row {
      display: flex;
      gap: 6px;
      padding: 8px 13px;
      border-top: 1px solid #30363d;
      flex-shrink: 0;
    }
    #chat-input {
      flex: 1;
      background: #0d1117;
      color: #e6edf3;
      border: 1px solid #30363d;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
    }
    #chat-input:focus { outline: none; border-color: #58a6ff; }

    /* ── Status bar ── */
    #statusbar {
      padding: 3px 13px;
      background: #161b22;
      border-top: 1px solid #30363d;
      font-size: 11px;
      color: #8b949e;
      display: flex;
      gap: 20px;
      flex-shrink: 0;
    }
    .dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }
    .dot-idle       { background: #484f58; }
    .dot-connecting { background: #d29922; animation: pulse 1.1s infinite; }
    .dot-connected  { background: #3fb950; }
    .dot-error      { background: #f85149; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }
  </style>
</head>
<body>

<!-- ── Toolbar ─────────────────────────────────────────────────────────── -->
<div id="toolbar">
  <span class="brand">Pi Vision</span>
  <input id="nats-url"  value="wss://tunnel.knitnox.com" style="width:230px" placeholder="NATS WebSocket URL" />
  <input id="nats-user" value="agent2"           style="width:80px"  placeholder="user" />
  <input id="nats-pass" value="agent2_password"  style="width:130px" type="password" placeholder="password" />
  <button id="btn-connect"    class="primary" onclick="doConnect()">Connect</button>
  <button id="btn-disconnect" class="danger"  onclick="doDisconnect()" style="display:none">Disconnect</button>
</div>

<!-- ── Main ────────────────────────────────────────────────────────────── -->
<div id="main">

  <!-- Video -->
  <div id="video-wrap">
    <video id="video" autoplay playsinline muted></video>
    <span id="placeholder">Not connected</span>
  </div>

  <!-- Sidebar -->
  <div id="sidebar">

    <!-- Stats -->
    <div class="panel" id="stats-panel">
      <h3>Stats</h3>
      <div class="stat-row"><span class="stat-key">State</span>      <span class="stat-val" id="s-state">—</span></div>
      <div class="stat-row"><span class="stat-key">Transport</span>  <span class="stat-val" id="s-transport">—</span></div>
      <div class="stat-row"><span class="stat-key">FPS (recv)</span> <span class="stat-val" id="s-fps">—</span></div>
      <div class="stat-row"><span class="stat-key">Bitrate</span>    <span class="stat-val" id="s-kbps">—</span></div>
      <div class="stat-row"><span class="stat-key">RTT</span>        <span class="stat-val" id="s-rtt">—</span></div>
      <div class="stat-row"><span class="stat-key">Pkt Lost</span>   <span class="stat-val" id="s-pktlost">—</span></div>
    </div>

    <!-- Controls -->
    <div class="panel">
      <h3>Camera Controls</h3>

      <div class="ctrl-block">
        <div class="ctrl-label">Preset</div>
        <div class="ctrl-row">
          <button id="btn-low"    onclick="sendPreset('low')">Low</button>
          <button id="btn-medium" onclick="sendPreset('medium')">Medium</button>
          <button id="btn-high"   onclick="sendPreset('high')">High</button>
        </div>
      </div>

      <div class="ctrl-block">
        <div class="ctrl-label">Resolution</div>
        <div class="ctrl-row">
          <select id="sel-res" onchange="sendResolution(this.value)">
            <option value="320x240">320 × 240</option>
            <option value="640x480" selected>640 × 480</option>
            <option value="1280x720">1280 × 720</option>
          </select>
        </div>
      </div>

      <div class="ctrl-block">
        <div class="ctrl-label">Framerate</div>
        <div class="ctrl-row">
          <select id="sel-fps" onchange="sendFps(this.value)">
            <option value="10">10 fps</option>
            <option value="15">15 fps</option>
            <option value="20" selected>20 fps</option>
            <option value="30">30 fps</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Chat -->
    <div id="chat-panel">
      <h3>Chat</h3>
      <div id="chat-messages"></div>
      <div id="chat-input-row">
        <input id="chat-input" placeholder="Message…" onkeydown="chatKeydown(event)" />
        <button onclick="sendChat()">Send</button>
      </div>
    </div>

  </div><!-- /sidebar -->
</div><!-- /main -->

<!-- ── Status bar ───────────────────────────────────────────────────────── -->
<div id="statusbar">
  <span>
    <span class="dot dot-idle" id="dot-nats"></span>
    NATS: <span id="nats-status">disconnected</span>
  </span>
  <span>
    <span class="dot dot-idle" id="dot-rtc"></span>
    WebRTC: <span id="rtc-status">idle</span>
  </span>
</div>

<!-- ── Script ───────────────────────────────────────────────────────────── -->
<script type="module">
  // nats.ws ESM build via CDN
  import { connect as natsConnect, StringCodec } from "https://cdn.jsdelivr.net/npm/nats.ws@1.29.2/esm/nats.js";

  // ── Constants ──────────────────────────────────────────────────────────
  const SUBJECT = "webrtc.signaling";
  const ICE_SERVERS = [
    { urls: "stun:tunnel.knitnox.com:3478" },
    {
      urls: [
        "turn:tunnel.knitnox.com:3478?transport=udp",
        "turn:tunnel.knitnox.com:3478?transport=tcp",
        "turns:tunnel.knitnox.com:5349?transport=tcp",
      ],
      username: "tanim",
      credential: "1d3th@786",
    },
  ];
  const TRANSPORT_LABEL = { host: "Direct (host)", srflx: "STUN (srflx)", relay: "TURN (relay)" };

  // ── State ──────────────────────────────────────────────────────────────
  let nc           = null;   // NATS connection
  let pc           = null;   // RTCPeerConnection
  let dc           = null;   // DataChannel
  let statsTimer   = null;
  let prevBytes    = 0;
  let prevBytesTs  = 0;
  const sc         = StringCodec();

  // ── DOM helpers ────────────────────────────────────────────────────────
  const $  = id => document.getElementById(id);
  const video = $("video");

  function setNats(cls, text) {
    $("dot-nats").className    = `dot dot-${cls}`;
    $("nats-status").textContent = text;
  }
  function setRtc(cls, text) {
    $("dot-rtc").className    = `dot dot-${cls}`;
    $("rtc-status").textContent = text;
  }

  function setStat(id, val, cls = "") {
    const el = $(id);
    el.textContent = val;
    el.className   = `stat-val${cls ? " " + cls : ""}`;
  }

  function logChat(kind, text) {
    const box = $("chat-messages");
    const div = document.createElement("div");
    div.className = "msg";
    div.innerHTML = `<span class="${kind}">${text}</span>`;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  function resetStats() {
    ["s-state","s-transport","s-fps","s-kbps","s-rtt","s-pktlost"].forEach(id => setStat(id, "—"));
    prevBytes = prevBytesTs = 0;
  }

  // ── Connect ────────────────────────────────────────────────────────────
  window.doConnect = async function () {
    const url  = $("nats-url").value.trim();
    const user = $("nats-user").value.trim();
    const pass = $("nats-pass").value;

    $("btn-connect").disabled = true;
    setNats("connecting", "connecting…");
    logChat("sys", `Connecting to NATS at ${url}…`);

    try {
      nc = await natsConnect({ servers: url, user, pass, reconnect: false });
      setNats("connected", "connected");
      logChat("sys", "NATS connected. Starting WebRTC…");
    } catch (err) {
      setNats("error", `error: ${err.message}`);
      logChat("sys", `NATS error: ${err.message}`);
      $("btn-connect").disabled = false;
      return;
    }

    $("btn-connect").style.display    = "none";
    $("btn-disconnect").style.display = "";

    await startWebRTC();
  };

  // ── Disconnect ─────────────────────────────────────────────────────────
  window.doDisconnect = async function () {
    cleanup();
    if (nc) { try { await nc.close(); } catch(_) {} nc = null; }
    setNats("idle", "disconnected");
    setRtc("idle", "idle");
    $("btn-disconnect").style.display = "none";
    $("btn-connect").style.display    = "";
    $("btn-connect").disabled         = false;
    logChat("sys", "Disconnected.");
  };

  // ── WebRTC setup ───────────────────────────────────────────────────────
  async function startWebRTC() {
    setRtc("connecting", "connecting…");
    resetStats();

    pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });

    // Receive-only video
    pc.addTransceiver("video", { direction: "recvonly" });

    // DataChannel (must be created before offer)
    dc = pc.createDataChannel("control");
    dc.onopen    = () => logChat("sys", "DataChannel open.");
    dc.onclose   = () => logChat("sys", "DataChannel closed.");
    dc.onmessage = e => {
      try {
        const m = JSON.parse(e.data);
        if (m.type === "chat") {
          logChat("pi", `[Pi] ${m.text}`);
        } else if (m.type === "ack") {
          logChat("sys", `Ack: ${m.cmd} = ${m.value}`);
          if (m.cmd === "preset") highlightPreset(m.value);
        }
      } catch (_) {}
    };

    // Incoming video
    pc.ontrack = ev => {
      if (ev.track.kind !== "video") return;
      logChat("sys", "Video track received.");
      video.srcObject = ev.streams[0];
      video.style.display     = "block";
      $("placeholder").style.display = "none";
    };

    pc.onconnectionstatechange = () => {
      const s = pc.connectionState;
      setStat("s-state", s, s === "connected" ? "good" : s === "failed" ? "bad" : "warn");
      setRtc(s === "connected" ? "connected" : s === "failed" ? "error" : "connecting", s);
      if (s === "failed" || s === "closed") cleanup();
    };

    // Build offer and wait for ICE gathering to complete before sending.
    // Unlike aiortc (which blocks until gathering is done), the browser's
    // setLocalDescription returns immediately — candidates trickle in via
    // onicecandidate. We must wait for gathering=complete so the SDP we
    // send to the Pi already contains all candidates (matching aiortc behaviour).
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    await new Promise(resolve => {
      if (pc.iceGatheringState === "complete") { resolve(); return; }
      pc.onicegatheringstatechange = () => {
        if (pc.iceGatheringState === "complete") resolve();
      };
    });

    logChat("sys", "Offer created (ICE gathered). Sending to Pi…");

    let resp;
    try {
      resp = await nc.request(
        SUBJECT,
        sc.encode(JSON.stringify({ sdp: offer.sdp, type: offer.type })),
        { timeout: 20_000 }
      );
    } catch (err) {
      logChat("sys", `Signaling timeout / error: ${err.message}`);
      setRtc("error", "signaling failed");
      cleanup();
      return;
    }

    const answer = JSON.parse(sc.decode(resp.data));
    await pc.setRemoteDescription(new RTCSessionDescription(answer));
    logChat("sys", "Answer received. Waiting for connection…");

    statsTimer = setInterval(pollStats, 1000);
  }

  // ── Stats polling ──────────────────────────────────────────────────────
  async function pollStats() {
    if (!pc) return;
    try {
      const reports = await pc.getStats();
      reports.forEach(r => {
        if (r.type === "inbound-rtp" && r.kind === "video") {
          // Bitrate
          const now = Date.now() / 1000;
          if (prevBytesTs) {
            const kbps = ((r.bytesReceived - prevBytes) * 8 / (now - prevBytesTs) / 1000).toFixed(1);
            setStat("s-kbps", `${kbps} kbps`, parseFloat(kbps) > 50 ? "good" : "warn");
          }
          prevBytes   = r.bytesReceived;
          prevBytesTs = Date.now() / 1000;

          const lost = r.packetsLost ?? 0;
          setStat("s-pktlost", lost, lost === 0 ? "good" : lost < 10 ? "warn" : "bad");

          const fps = r.framesPerSecond != null ? r.framesPerSecond.toFixed(0) : "—";
          setStat("s-fps", fps, parseFloat(fps) > 10 ? "good" : "warn");
        }

        if (r.type === "candidate-pair" && r.state === "succeeded") {
          if (r.currentRoundTripTime != null) {
            const ms = (r.currentRoundTripTime * 1000).toFixed(0);
            setStat("s-rtt", `${ms} ms`, ms < 100 ? "good" : ms < 300 ? "warn" : "bad");
          }
        }

        if (r.type === "local-candidate") {
          const label = TRANSPORT_LABEL[r.candidateType] ?? r.candidateType ?? "—";
          setStat("s-transport", label, r.candidateType === "host" ? "good" : r.candidateType === "relay" ? "warn" : "");
        }
      });
    } catch (_) {}
  }

  // ── Cleanup ────────────────────────────────────────────────────────────
  function cleanup() {
    clearInterval(statsTimer); statsTimer = null;
    if (dc) { try { dc.close(); } catch(_) {} dc = null; }
    if (pc) { try { pc.close(); } catch(_) {} pc = null; }
    video.srcObject         = null;
    video.style.display     = "none";
    $("placeholder").style.display = "";
    resetStats();
  }

  // ── Chat ───────────────────────────────────────────────────────────────
  window.chatKeydown = function (e) {
    if (e.key === "Enter") sendChat();
  };

  window.sendChat = function () {
    const input = $("chat-input");
    const text  = input.value.trim();
    if (!text || !dc || dc.readyState !== "open") return;
    dc.send(JSON.stringify({ type: "chat", text }));
    logChat("pc", `[PC] ${text}`);
    input.value = "";
  };

  // ── Camera controls ────────────────────────────────────────────────────
  function sendControl(cmd, value) {
    if (!dc || dc.readyState !== "open") {
      logChat("sys", "DataChannel not open.");
      return;
    }
    dc.send(JSON.stringify({ type: "control", cmd, value }));
  }

  window.sendPreset = function (name) {
    sendControl("preset", name);
    // Optimistically update resolution/fps selects to match preset
    const map = { low: ["320x240", "10"], medium: ["640x480", "20"], high: ["1280x720", "30"] };
    if (map[name]) {
      $("sel-res").value = map[name][0];
      $("sel-fps").value = map[name][1];
    }
  };

  window.sendResolution = function (val) { sendControl("resolution", val); };
  window.sendFps        = function (val) { sendControl("fps",        val); };

  function highlightPreset(name) {
    ["low","medium","high"].forEach(n => $(`btn-${n}`).classList.toggle("active", n === name));
  }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Walkie-Talkie</title>
<style>
  :root {
    --bg: #111311; --surface: #1a1d1a; --border: #2a2d28;
    --text: #e8eae6; --dim: #7a7f76; --accent: #e8472a;
    --green: #4caf50; --yellow: #f5a623;
    --font: system-ui, -apple-system, sans-serif;
    --ptt-size: min(36vw, 170px);
    --safe-b: env(safe-area-inset-bottom, 8px);
    --safe-t: env(safe-area-inset-top, 8px);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { height: 100%; overflow: hidden; }
  body {
    font-family: var(--font); background: var(--bg);
    color: var(--text); height: 100dvh; height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    -webkit-tap-highlight-color: transparent; user-select: none;
    -webkit-user-select: none; padding: var(--safe-t) 0 var(--safe-b);
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none; position: fixed; inset: 0;
  }

  .container {
    width: 100%; max-width: 440px; height: 100%;
    display: flex; flex-direction: column; padding: 8px 14px;
  }

  /* ── Status bar ── */
  .status-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 2px; gap: 10px; flex-shrink: 0;
  }
  .status-left { display: flex; align-items: center; gap: 7px; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .status-dot.on { background: var(--green); box-shadow: 0 0 8px rgba(76,175,80,0.5); }
  .status-dot.off { background: #555; }
  .status-dot.warn { background: var(--yellow); box-shadow: 0 0 8px rgba(245,166,35,0.5); }
  .status-dot.busy { background: var(--accent); box-shadow: 0 0 8px rgba(232,71,42,0.5); }
  .status-text { font-size: 0.8rem; font-weight: 600; }
  .status-right { display: flex; align-items: center; gap: 10px; font-size: 0.78rem; color: var(--dim); }

  /* ── Channel row ── */
  .ch-row { display: flex; align-items: center; gap: 6px; padding: 4px 0; flex-shrink: 0; }
  .ch-hash { color: var(--dim); font-weight: 600; font-size: 1rem; flex-shrink: 0; }
  .ch-input {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-size: 0.82rem; padding: 9px 10px; border-radius: 8px;
    outline: none; min-width: 0; font-family: monospace;
  }
  .ch-input:focus { border-color: #555; }
  .ch-input::placeholder { color: #444; }
  .btn-sm {
    width: 36px; height: 36px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--surface); color: var(--text); font-size: 0.9rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-sm:active { background: #2a2d28; }

  /* ── VU meters ── */
  .vu-row { display: flex; gap: 8px; padding: 2px 0; flex-shrink: 0; }
  .vu-item { flex: 1; display: flex; flex-direction: column; gap: 2px; }
  .vu-label { font-size: 0.58rem; color: var(--dim); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
  .vu-track { display: flex; gap: 2px; height: 10px; }
  .vu-seg { flex: 1; background: #222420; border-radius: 1.5px; transition: background 0.06s; }
  .vu-seg.s1 { background: #2d5a1e; }
  .vu-seg.s2 { background: #4a8a2a; }
  .vu-seg.s3 { background: #6db830; }
  .vu-seg.s4 { background: #b0c830; }
  .vu-seg.s5 { background: #e89820; }
  .vu-seg.s6 { background: #e83818; box-shadow: 0 0 3px rgba(232,56,24,0.5); }

  /* ── Controls row ── */
  .ctrl-row { display: flex; align-items: center; gap: 8px; padding: 2px 0; flex-shrink: 0; }
  .btn-icon {
    width: 38px; height: 38px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--surface); color: var(--text); font-size: 1rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-icon:active { background: #2a2d28; }
  .btn-icon.muted { border-color: #444; opacity: 0.5; }
  .vol-slider {
    flex: 1; -webkit-appearance: none; appearance: none; height: 6px;
    background: #222420; border-radius: 3px; outline: none; min-width: 50px;
  }
  .vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%;
    background: #ddd; border: 2px solid #555; cursor: pointer;
  }
  .vol-slider::-moz-range-thumb {
    width: 22px; height: 22px; border-radius: 50%; background: #ddd; border: 2px solid #555; cursor: pointer;
  }

  /* ── PTT Button ── */
  .ptt-zone {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 6px 0; min-height: 80px;
  }
  .ptt-btn {
    width: var(--ptt-size); height: var(--ptt-size); border-radius: 50%;
    border: 3px solid #6b1a08;
    background: radial-gradient(circle at 38% 32%, #e05030, #a02010 65%, #5a0802 100%);
    color: #ffe0d0; cursor: pointer; display: flex; align-items: center;
    justify-content: center; position: relative;
    box-shadow: 0 6px 24px rgba(0,0,0,0.5), 0 2px 4px rgba(0,0,0,0.3),
                inset 0 2px 3px rgba(255,255,255,0.12), inset 0 -3px 5px rgba(0,0,0,0.4);
    transition: transform 0.1s, box-shadow 0.15s;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  .ptt-inner { display: flex; flex-direction: column; align-items: center; gap: 1px; z-index: 1; }
  .ptt-icon { font-size: 2.6rem; line-height: 1; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.4)); transition: transform 0.1s; }
  .ptt-label { font-size: 0.72rem; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; }

  /* Pressed */
  .ptt-btn:active { transform: scale(0.94); box-shadow: 0 3px 8px rgba(0,0,0,0.6), 0 0 40px rgba(232,71,42,0.35), inset 0 3px 6px rgba(0,0,0,0.5); }

  /* Talking */
  .ptt-btn.talking { border-color: #f05030; animation: pttPulse 0.5s ease-in-out infinite; }
  .ptt-btn.talking .ptt-icon { transform: scale(1.05); }
  @keyframes pttPulse {
    0%,100% { box-shadow: 0 6px 24px rgba(0,0,0,0.5), 0 0 50px rgba(232,71,42,0.4), inset 0 2px 3px rgba(255,150,100,0.15), inset 0 -3px 5px rgba(0,0,0,0.4); }
    50% { box-shadow: 0 6px 24px rgba(0,0,0,0.5), 0 0 85px rgba(232,71,42,0.65), inset 0 2px 3px rgba(255,150,100,0.25), inset 0 -3px 5px rgba(0,0,0,0.4); }
  }

  /* Warning (time limit) */
  .ptt-btn.warning { border-color: #c89420; animation: pttWarn 0.5s ease-in-out infinite; }
  @keyframes pttWarn {
    0%,100% { box-shadow: 0 6px 24px rgba(0,0,0,0.5), 0 0 35px rgba(245,166,35,0.3), inset 0 2px 3px rgba(255,200,100,0.12), inset 0 -3px 5px rgba(0,0,0,0.4); }
    50% { box-shadow: 0 6px 24px rgba(0,0,0,0.5), 0 0 65px rgba(245,166,35,0.5), inset 0 2px 3px rgba(255,200,100,0.2), inset 0 -3px 5px rgba(0,0,0,0.4); }
  }

  /* Busy */
  .ptt-btn.floor-busy {
    border-color: #333; background: radial-gradient(circle at 38% 32%, #3a3a35, #1a1a15 65%, #0a0a05 100%);
    box-shadow: 0 6px 24px rgba(0,0,0,0.5); cursor: not-allowed; opacity: 0.7;
  }
  .ptt-btn.floor-busy .ptt-icon { filter: grayscale(0.6); opacity: 0.45; }
  .ptt-btn.floor-busy .ptt-label { color: #666; }
  .ptt-btn.busy-flash { border-color: var(--yellow) !important; box-shadow: 0 0 35px rgba(245,166,35,0.5) !important; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: max(20px, var(--safe-b)); left: 50%; transform: translateX(-50%);
    background: #222420; border: 1px solid #3a3d35; padding: 10px 18px;
    border-radius: 10px; font-size: 0.8rem; font-weight: 500; z-index: 100; opacity: 0;
    transition: opacity 0.2s, transform 0.2s; pointer-events: none;
    box-shadow: 0 6px 20px rgba(0,0,0,0.6); max-width: 90vw; text-align: center;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-2px); }

  /* ── Hint ── */
  .hint { text-align: center; font-size: 0.58rem; color: var(--dim); padding: 2px 0; flex-shrink: 0; }

  /* ── Responsive ── */
  @media (max-width: 380px) {
    :root { --ptt-size: min(40vw, 130px); }
    .ptt-icon { font-size: 2.2rem; }
    .ptt-label { font-size: 0.66rem; }
    .container { padding: 6px 10px; }
    .ch-input { font-size: 0.76rem; padding: 8px; }
    .btn-sm { width: 32px; height: 32px; }
    .btn-icon { width: 34px; height: 34px; }
  }
  @media (min-height: 750px) {
    :root { --ptt-size: min(33vw, 180px); }
    .ptt-icon { font-size: 2.8rem; }
    .ptt-label { font-size: 0.78rem; }
  }
  @media (max-height: 500px) and (orientation: landscape) {
    :root { --ptt-size: 88px; }
    .container { padding: 2px 10px; }
    .status-bar, .vu-row, .hint { display: none; }
    .ptt-icon { font-size: 1.3rem; }
    .ptt-label { font-size: 0.5rem; }
    .ch-row { padding: 1px 0; }
    .ctrl-row { padding: 1px 0; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- Status bar -->
  <div class="status-bar">
    <div class="status-left">
      <div class="status-dot off" id="statusDot"></div>
      <span class="status-text" id="statusText">Connecting</span>
    </div>
    <div class="status-right">
      <span id="listenerCount">--</span>
    </div>
  </div>

  <!-- Channel -->
  <div class="ch-row">
    <span class="ch-hash">#</span>
    <input class="ch-input" id="channelInput" type="text" placeholder="channel-name" maxlength="60" autocomplete="off" spellcheck="false">
    <button class="btn-sm" id="copyBtn" title="Copy link">📋</button>
    <button class="btn-sm" id="newBtn" title="New channel">✨</button>
  </div>

  <!-- VU meters -->
  <div class="vu-row">
    <div class="vu-item">
      <span class="vu-label">Mic</span>
      <div class="vu-track" id="vuMicBars"></div>
    </div>
    <div class="vu-item">
      <span class="vu-label">Spk</span>
      <div class="vu-track" id="vuSpkBars"></div>
    </div>
  </div>

  <!-- Controls: mute + volume -->
  <div class="ctrl-row">
    <button class="btn-icon" id="recvToggle" title="Toggle speaker">🔊</button>
    <span style="font-size:0.65rem;color:var(--dim);flex-shrink:0;">🔈</span>
    <input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="80" aria-label="Volume">
    <span style="font-size:0.65rem;color:var(--dim);flex-shrink:0;">🔊</span>
  </div>

  <!-- PTT -->
  <div class="ptt-zone">
    <button class="ptt-btn" id="pttBtn">
      <div class="ptt-inner">
        <span class="ptt-icon">🎙️</span>
        <span class="ptt-label">PTT</span>
      </div>
    </button>
  </div>

  <!-- Hint -->
  <div class="hint" id="footerInfo">Press &amp; hold to talk</div>

  <div class="toast" id="toast"></div>
</div>

<script type="module">
import { connect } from 'https://esm.sh/nats.ws@1.28.0';
import FingerprintJS from 'https://esm.sh/@fingerprintjs/fingerprintjs@3';

// ── Config ──
const CHUNK_MS = 100;
const OPUS_CODECS = ['audio/webm;codecs=opus','audio/ogg;codecs=opus'];
const CHANNEL_ID_LEN = 16;
const WORDLIST = [
  'alpha','bravo','charlie','delta','echo','foxtrot','golf','hotel',
  'india','juliet','kilo','lima','mike','november','oscar','papa',
  'quebec','romeo','sierra','tango','uniform','victor','whiskey',
  'xray','yankee','zulu','atlas','blaze','cobra','dragon','eagle',
  'falcon','ghost','hammer','inferno','jaguar','kappa','lightning',
  'meteor','nebula','omega','phantom','quartz','raptor','shadow',
  'thunder','ultra','vortex','wolf','xenon','yeti','zenith','amber',
  'bolt','crystal','drift','ember','frost','glacier','haven','onyx',
];

// ═══════════════════════ State ═══════════════════════
const state = {
  channel: '', passphrase: '', fingerprint: '',
  realUser: 'bootstrap', realPass: 'bootstrap',
  connected: false, talking: false, micReady: false,
  nats: null, subAudio: null, subCtrl: null,
  mediaRecorder: null, micStream: null, supportedCodec: '',
  mediaSource: null, sourceBuffer: null, chunkQueue: [], isAppending: false,
  vuMicNode: null, vuSpkNode: null, audioCtx: null,
  heartbeatTimer: null, presenceCount: 0,
  floorOccupied: false, floorOwner: '', floorOwnerId: '', myClaimTs: 0,
  talkTimer: null, talkStartTs: 0,
  maxTalkMs: 115000, warnAtMs: 105000,
  talkRequested: false, receiving: true,
};

// ═══════════════════════ DOM ═══════════════════════
const $ = (id) => document.getElementById(id);
const channelInput = $('channelInput');
const copyBtn = $('copyBtn'); const newBtn = $('newBtn');
const pttBtn = $('pttBtn');
const statusDot = $('statusDot'); const statusText = $('statusText');
const listenerCount = $('listenerCount');
const vuMicBars = $('vuMicBars'); const vuSpkBars = $('vuSpkBars');
const volSlider = $('volSlider');
const recvToggle = $('recvToggle');
const footerInfo = $('footerInfo'); const toastEl = $('toast');

// ═══════════════════════ Helpers ═══════════════════════
function randomId(len = CHANNEL_ID_LEN) {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  return Array.from({length: len}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
}
function randomPassphrase(n = 4) {
  return Array.from({length: n}, () => WORDLIST[Math.floor(Math.random() * WORDLIST.length)]).join('-');
}
function generateChannelCreds() { return { id: randomId(), passphrase: randomPassphrase() }; }

function toast(msg, ms = 2000) {
  toastEl.textContent = msg; toastEl.classList.add('show');
  clearTimeout(toast._t); toast._t = setTimeout(() => toastEl.classList.remove('show'), ms);
}

function updateStatus(type, text) {
  statusDot.className = 'status-dot ' + type; // on, off, warn, busy
  statusText.textContent = text;
}

// ── VU bars ──
(function initVUBars() {
  for (const c of [vuMicBars, vuSpkBars]) {
    for (let i = 0; i < 14; i++) { const s = document.createElement('div'); s.className = 'vu-seg'; c.appendChild(s); }
  }
})();
function updateVU(bars, value) {
  const pct = Math.min(100, Math.max(0, value));
  const n = Math.round(pct / 100 * bars.children.length);
  for (let i = 0; i < bars.children.length; i++) {
    const seg = bars.children[i]; seg.className = 'vu-seg';
    if (i < n) {
      if (i < 5) seg.className = 'vu-seg s1'; else if (i < 7) seg.className = 'vu-seg s2';
      else if (i < 9) seg.className = 'vu-seg s3'; else if (i < 11) seg.className = 'vu-seg s4';
      else if (i < 13) seg.className = 'vu-seg s5'; else seg.className = 'vu-seg s6';
    }
  }
}

// ═══════════════════════ NATS ═══════════════════════
async function connectNATS(user = 'bootstrap', pass = 'bootstrap') {
  try {
    const nc = await connect({
      servers: ['wss://tunnel.knitnox.com'], user, pass,
      maxReconnectAttempts: -1, reconnectTimeWait: 2000, timeout: 5000, pingInterval: 20000,
    });
    state.nats = nc; state.connected = true;
    updateStatus('on', 'Connected');
    (async () => {
      let dcTimer = null;
      for await (const s of nc.status()) {
        if (s.type === 'disconnect') {
          state.connected = false;
          clearTimeout(dcTimer);
          dcTimer = setTimeout(() => { if (!state.connected) updateStatus('warn', 'Reconnecting'); }, 2000);
        } else if (s.type === 'reconnect') {
          clearTimeout(dcTimer);
          state.connected = true; updateStatus('on', 'Connected'); resubscribe();
        }
      }
    })().catch(() => {});
    return nc;
  } catch (e) { console.error(e); updateStatus('off', 'Offline'); throw e; }
}

function resubscribe() { if (state.channel) { unsubscribe(); subscribeAll(); } }
function unsubscribe() {
  if (state.subAudio) { state.subAudio.unsubscribe(); state.subAudio = null; }
  if (state.subCtrl) { state.subCtrl.unsubscribe(); state.subCtrl = null; }
}
function subscribeAll() {
  const ch = state.channel; if (!ch || !state.nats) return;
  state.subAudio = state.nats.subscribe(`walkie.${ch}.audio`, { callback: (_, msg) => { if (msg) handleAudioChunk(msg.data); } });
  state.subCtrl = state.nats.subscribe(`walkie.${ch}.ctrl`, { callback: (_, msg) => {
    if (!msg) return;
    try { handleCtrl(JSON.parse(new TextDecoder().decode(msg.data))); } catch (e) {}
  }});
}

function handleCtrl(ctrl) {
  switch (ctrl.type) {
    case 'stream-start': resetMediaSource(); updateVU(vuSpkBars, 15); break;
    case 'floor-taken':
      state.floorOccupied = true; state.floorOwner = ctrl.id || ''; updatePTTState();
      if (state.talking && ctrl.id !== state.floorOwnerId && ctrl.ts && state.myClaimTs && ctrl.ts < state.myClaimTs) {
        forceStopTalk('Channel busy');
      }
      break;
    case 'floor-released':
      if (!ctrl.id || ctrl.id === state.floorOwner) { state.floorOccupied = false; state.floorOwner = ''; updatePTTState(); }
      break;
    case 'presence': if (ctrl.count !== undefined) { state.presenceCount = ctrl.count; listenerCount.textContent = `👤 ${ctrl.count}`; } break;
  }
}

function handleAudioChunk(data) {
  if (!data || data.length === 0 || state.talking || !state.receiving) return;
  state.chunkQueue.push(new Uint8Array(data)); drainQueue();
}

// ═══════════════════════ MSE Playback ═══════════════════════
function resetMediaSource() {
  state.chunkQueue = []; state.isAppending = false; state.sourceBuffer = null;
  if (state.mediaSource) {
    try { if (state.mediaSource.readyState === 'open') state.mediaSource.endOfStream(); } catch (e) {}
    state.mediaSource.removeEventListener('sourceopen', onSourceOpen);
  }
  state.mediaSource = new MediaSource();
  state.mediaSource.addEventListener('sourceopen', onSourceOpen);
  const audio = $('audioOut');
  if (audio) {
    if (audio.src && audio.src.startsWith('blob:')) URL.revokeObjectURL(audio.src);
    audio.src = URL.createObjectURL(state.mediaSource);
  }
}
function onSourceOpen() {
  for (const codec of OPUS_CODECS) {
    try {
      state.sourceBuffer = state.mediaSource.addSourceBuffer(codec);
      state.sourceBuffer.mode = 'sequence';
      state.sourceBuffer.addEventListener('updateend', () => { state.isAppending = false; drainQueue(); });
      drainQueue(); return;
    } catch (e) {}
  }
  console.error('Cannot add Opus SourceBuffer');
}
function drainQueue() {
  if (state.isAppending || !state.sourceBuffer || state.mediaSource?.readyState !== 'open' || !state.chunkQueue.length) return;
  updateVU(vuSpkBars, Math.min(state.chunkQueue.length * 15, 70));
  state.isAppending = true;
  try { state.sourceBuffer.appendBuffer(state.chunkQueue.shift()); }
  catch (e) { state.isAppending = false; if (e.name === 'InvalidStateError' || e.name === 'NotSupportedError') resetMediaSource(); }
}

function setupAudioOutput() {
  let audio = $('audioOut');
  if (!audio) { audio = document.createElement('audio'); audio.id = 'audioOut'; audio.autoplay = true; audio.playsInline = true; document.body.appendChild(audio); }
  try {
    state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const src = state.audioCtx.createMediaElementSource(audio);
    const a = state.audioCtx.createAnalyser(); a.fftSize = 128; a.smoothingTimeConstant = 0.3;
    src.connect(a); a.connect(state.audioCtx.destination); state.vuSpkNode = a;
    const d = new Uint8Array(a.frequencyBinCount);
    (function poll() { if (state.vuSpkNode) { state.vuSpkNode.getByteFrequencyData(d); updateVU(vuSpkBars, d.reduce((x,y)=>x+y,0)/d.length*1.5); } requestAnimationFrame(poll); })();
    document.addEventListener('click', () => { if (state.audioCtx?.state === 'suspended') state.audioCtx.resume(); }, { once: true });
  } catch (e) { console.warn('AudioContext setup failed:', e); }
  audio.volume = volSlider.value / 100;
  volSlider.addEventListener('input', () => { audio.volume = volSlider.value / 100; });
  return audio;
}

// ═══════════════════════ Mic + MediaRecorder ═══════════════════════
async function initMic() {
  releaseMic();
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } });
    state.micStream = stream; state.micReady = true;
    if (state.audioCtx) {
      const src = state.audioCtx.createMediaStreamSource(stream);
      const a = state.audioCtx.createAnalyser(); a.fftSize = 128; a.smoothingTimeConstant = 0.1;
      src.connect(a); state.vuMicNode = a;
      const d = new Uint8Array(a.frequencyBinCount);
      (function poll() { if (state.vuMicNode) { state.vuMicNode.getByteFrequencyData(d); updateVU(vuMicBars, (d.reduce((x,y)=>x+y,0)/d.length)*(state.talking?1.5:0.4)); } requestAnimationFrame(poll); })();
    }
    const sup = OPUS_CODECS.find(c => MediaRecorder.isTypeSupported(c));
    state.supportedCodec = sup || '';
    footerInfo.textContent = sup ? `Opus ${CHUNK_MS}ms ready` : '⚠️ Opus unsupported';
    return stream;
  } catch (e) { state.micReady = false; state.micStream = null; footerInfo.textContent = '❌ Mic denied'; toast('Mic access required to talk'); throw e; }
}
function releaseMic() {
  if (state.micStream) { state.micStream.getTracks().forEach(t => t.stop()); state.micStream = null; }
  state.micReady = false; state.vuMicNode = null; updateVU(vuMicBars, 0);
  footerInfo.textContent = state.supportedCodec ? `Opus ${CHUNK_MS}ms ready` : 'Ready';
}
function createRecorder() {
  if (!state.micStream || !state.supportedCodec) { toast('❌ Opus unsupported'); return null; }
  const mr = new MediaRecorder(state.micStream, { mimeType: state.supportedCodec });
  mr.ondataavailable = async (e) => { if (e.data.size && state.nats?.connected) { try { state.nats.publish(`walkie.${state.channel}.audio`, new Uint8Array(await e.data.arrayBuffer())); } catch (_) {} } };
  mr.onstop = () => { if (state.nats?.connected && state.channel) { try { state.nats.publish(`walkie.${state.channel}.ctrl`, JSON.stringify({ type: 'stream-end' })); } catch (_) {} } };
  mr.onerror = () => endTalk();
  return mr;
}

// ═══════════════════════ PTT ═══════════════════════
async function startTalk() {
  if (state.floorOccupied) { toast('Channel busy'); pttBtn.classList.add('busy-flash'); setTimeout(() => pttBtn.classList.remove('busy-flash'), 300); return; }
  state.talkRequested = true;
  if (!state.nats || !state.connected) { try { await connectToChannel(); } catch (_) { toast('Cannot connect'); return; } if (!state.nats?.connected) { toast('Cannot connect'); return; } }
  if (!state.talkRequested) { releaseMic(); return; }
  if (!state.channel) { joinChannel(); await connectToChannel(); }
  if (state.audioCtx?.state === 'suspended') await state.audioCtx.resume();
  if (!state.talkRequested) { releaseMic(); return; }
  if (!state.micReady) { try { await initMic(); } catch (_) { return; } }
  if (!state.talkRequested) { releaseMic(); return; }

  state.myClaimTs = Date.now(); state.floorOwnerId = Math.random().toString(36).slice(2, 10);
  state.nats.publish(`walkie.${state.channel}.ctrl`, JSON.stringify({ type: 'floor-taken', id: state.floorOwnerId, ts: state.myClaimTs }));
  state.floorOccupied = true; state.floorOwner = state.floorOwnerId; updatePTTState();
  state.nats.publish(`walkie.${state.channel}.ctrl`, JSON.stringify({ type: 'stream-start' }));

  state.mediaRecorder = createRecorder();
  if (!state.mediaRecorder) { state.floorOccupied = false; state.talkRequested = false; releaseMic(); return; }

  state.talking = true;
  state.mediaRecorder.start(CHUNK_MS); state.talkStartTs = Date.now();
  pttBtn.classList.add('talking'); pttBtn.querySelector('.ptt-icon').textContent = '🔴'; pttBtn.querySelector('.ptt-label').textContent = 'TX';
  updateStatus('busy', 'Talking');
  startTalkTimer();
}
function startTalkTimer() {
  clearInterval(state.talkTimer);
  state.talkTimer = setInterval(() => {
    const e = Date.now() - state.talkStartTs;
    if (e >= state.warnAtMs && e < state.maxTalkMs) { pttBtn.querySelector('.ptt-label').textContent = `⚠️ ${Math.ceil((state.maxTalkMs - e) / 1000)}s`; pttBtn.classList.add('warning'); }
    if (e >= state.maxTalkMs) forceStopTalk('2 min limit');
  }, 500);
}
function forceStopTalk(reason) { toast(reason); endTalk(); }

function endTalk() {
  state.talkRequested = false;
  if (!state.talking) {
    if (state.floorOccupied && state.floorOwner === state.floorOwnerId) {
      state.floorOccupied = false; state.floorOwner = ''; state.floorOwnerId = ''; state.myClaimTs = 0; updatePTTState();
      if (state.nats?.connected && state.channel) { try { state.nats.publish(`walkie.${state.channel}.ctrl`, JSON.stringify({ type: 'floor-released', id: 'aborted' })); } catch (_) {} }
    }
    releaseMic(); pttBtn.classList.remove('talking','warning','floor-busy'); pttBtn.querySelector('.ptt-icon').textContent = '🎙️'; pttBtn.querySelector('.ptt-label').textContent = 'PTT'; updateVU(vuMicBars, 0); updateStatus(state.connected ? 'on' : 'off', state.connected ? 'Connected' : 'Offline'); return;
  }
  clearInterval(state.talkTimer); state.talkTimer = null;
  pttBtn.classList.remove('talking','warning'); pttBtn.querySelector('.ptt-icon').textContent = '🎙️'; pttBtn.querySelector('.ptt-label').textContent = 'PTT';
  updateVU(vuMicBars, 0); updateStatus('on', 'Connected');
  if (state.mediaRecorder?.state === 'recording') { state.mediaRecorder.stop(); state.mediaRecorder = null; }
  if (state.nats?.connected && state.channel) {
    try { state.nats.publish(`walkie.${state.channel}.ctrl`, JSON.stringify({ type: 'stream-end' })); } catch (_) {}
    try { state.nats.publish(`walkie.${state.channel}.ctrl`, JSON.stringify({ type: 'floor-released', id: state.floorOwnerId })); } catch (_) {}
  }
  state.floorOccupied = false; state.floorOwner = ''; state.floorOwnerId = ''; state.myClaimTs = 0; updatePTTState();
  resetMediaSource(); releaseMic(); state.talking = false;
}
function updatePTTState() {
  if (state.floorOccupied && !state.talking) {
    pttBtn.classList.add('floor-busy'); pttBtn.querySelector('.ptt-icon').textContent = '🔒'; pttBtn.querySelector('.ptt-label').textContent = 'BUSY';
  } else { pttBtn.classList.remove('floor-busy'); if (!state.talking) { pttBtn.querySelector('.ptt-icon').textContent = '🎙️'; pttBtn.querySelector('.ptt-label').textContent = 'PTT'; } }
}

// ═══════════════════════ Channel ═══════════════════════
function joinChannel(name, passphrase = '') {
  if (!name) { const c = generateChannelCreds(); name = c.id; passphrase = c.passphrase; }
  if (!passphrase) passphrase = randomPassphrase();
  state.channel = name; state.passphrase = passphrase; channelInput.value = name;
  window.location.hash = `#${name}:${passphrase}`;
  state.talkRequested = false; if (state.talking) endTalk();
  state.floorOccupied = false; state.floorOwner = ''; state.floorOwnerId = ''; state.myClaimTs = 0; updatePTTState();
  unsubscribe(); resetMediaSource();
  document.title = `📻 ${name}`; toast(`#${name}`);
}

async function connectToChannel() {
  if (state.nats) { try { await state.nats.close(); } catch (_) {} }
  state.nats = null; state.connected = false;

  try {
    // Step 1: Connect as bootstrap (only walkie.auth.> permissions)
    await connectNATS('bootstrap', 'bootstrap');

    // Step 2: Request real credentials via explicit reply subject
    const replyId = 'r' + randomId(12);
    const replySub = `walkie.auth.reply.${replyId}`;

    const creds = await new Promise((resolve, reject) => {
      const timeout = setTimeout(() => { sub.unsubscribe(); reject(new Error('timeout')); }, 5000);

      const sub = state.nats.subscribe(replySub, {
        callback: (_, msg) => {
          clearTimeout(timeout);
          sub.unsubscribe();
          try {
            const r = JSON.parse(new TextDecoder().decode(msg.data));
            resolve(r.ok ? r : null);
          } catch (e) { reject(e); }
        }
      });

      state.nats.publish('walkie.auth.creds', JSON.stringify({
        fingerprint: state.fingerprint,
        channel_id: state.channel,
        passphrase: state.passphrase,
        reply: replySub,    // <-- explicit reply subject
      }));
    });

    // Step 3: Close bootstrap, connect with real credentials
    try { await state.nats.close(); } catch (_) {}
    state.nats = null; state.connected = false;

    if (!creds?.user) {
      updateStatus('off', 'Auth denied');
      return;
    }

    await connectNATS(creds.user, creds.pass);
    if (creds.occupants !== undefined) listenerCount.textContent = `👤 ${creds.occupants}`;
    subscribeAll();
    startHeartbeat();
  } catch (e) {
    if (state.nats) { try { await state.nats.close(); } catch (_) {} }
    state.nats = null; state.connected = false;
    updateStatus('off', 'Connection failed');
    toast('Connection failed');
  }
}

function startHeartbeat() {
  clearInterval(state.heartbeatTimer);
  state.heartbeatTimer = setInterval(async () => {
    if (!state.nats?.connected || !state.channel) return;
    state.nats.publish(`walkie.${state.channel}.ctrl`, JSON.stringify({ type: 'presence', ts: Date.now() }));
    try {
      const reply = await state.nats.request('walkie.auth.status', JSON.stringify({ channel_id: state.channel }), { timeout: 2000 });
      const r = JSON.parse(new TextDecoder().decode(reply.data));
      if (r.ok && r.occupants !== undefined) listenerCount.textContent = `👤 ${r.occupants}`;
    } catch (_) {}
  }, 5000);
}

// ═══════════════════════ Events ═══════════════════════
pttBtn.addEventListener('mousedown', e => { e.preventDefault(); startTalk(); });
pttBtn.addEventListener('mouseup', e => { e.preventDefault(); endTalk(); });
pttBtn.addEventListener('mouseleave', () => { if (state.talking) endTalk(); });
pttBtn.addEventListener('touchstart', e => { e.preventDefault(); startTalk(); }, { passive: false });
pttBtn.addEventListener('touchend', e => { e.preventDefault(); endTalk(); });
pttBtn.addEventListener('touchcancel', () => { if (state.talking) endTalk(); });
document.addEventListener('keydown', e => { if (e.code === 'Space' && !e.repeat && document.activeElement !== channelInput) { e.preventDefault(); startTalk(); } });
document.addEventListener('keyup', e => { if (e.code === 'Space' && state.talking) { e.preventDefault(); endTalk(); } });

channelInput.addEventListener('change', () => handleChannelInput());
channelInput.addEventListener('keydown', e => { if (e.key === 'Enter') { channelInput.blur(); handleChannelInput(); } });
function handleChannelInput() {
  let raw = channelInput.value.trim(); if (!raw) return;
  const h = raw.lastIndexOf('#'); if (h !== -1) raw = raw.slice(h + 1);
  const c = raw.indexOf(':');
  if (c !== -1) joinChannel(raw.slice(0, c), raw.slice(c + 1)); else joinChannel(raw, '');
  connectToChannel();
}

copyBtn.addEventListener('click', () => { navigator.clipboard.writeText(window.location.href).then(() => toast('📋 Link copied!'), () => toast('Copy failed')); });
newBtn.addEventListener('click', () => { joinChannel(); connectToChannel(); });
recvToggle.addEventListener('click', () => {
  state.receiving = !state.receiving; recvToggle.textContent = state.receiving ? '🔊' : '🔇';
  recvToggle.className = state.receiving ? 'btn-icon' : 'btn-icon muted';
  if (!state.receiving) { state.chunkQueue = []; resetMediaSource(); }
});

// ═══════════════════════ Init ═══════════════════════
async function init() {
  try { const fp = await FingerprintJS.load(); state.fingerprint = (await fp.get()).visitorId; } catch (_) { state.fingerprint = 'anon-' + randomId(8); }
  setupAudioOutput(); resetMediaSource();

  const hash = window.location.hash.slice(1);
  let ch = '', pw = '';
  if (hash) { const p = hash.split(':'); ch = p[0] || ''; pw = p[1] || ''; }
  if (!ch) { const c = generateChannelCreds(); ch = c.id; pw = c.passphrase; }
  joinChannel(ch, pw);

  try { await connectToChannel(); } catch (_) {
    updateStatus('off', 'Connection failed');
    const retry = () => { connectToChannel().catch(() => setTimeout(retry, 5000)); };
    setTimeout(retry, 5000);
  }
  footerInfo.textContent = 'Hold to talk • Space or tap';

  window.addEventListener('hashchange', () => {
    const raw = window.location.hash.slice(1); if (!raw) return;
    const p = raw.split(':'); const cid = p[0];
    if (cid && cid !== state.channel) { joinChannel(cid, p[1] || ''); connectToChannel(); }
  });
}
init().catch(e => { console.error(e); updateStatus('off', 'Error'); footerInfo.textContent = '❌ ' + e.message; });
</script>
